<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0e9aa7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative geometric grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- Icon -->
  <g transform="translate(210,315)">
    <circle cx="0" cy="0" r="70" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="64" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.12"/>
    <circle cx="0" cy="-44" r="8" fill="#fff"/>
    <circle cx="-35" cy="35" r="8" fill="#fff"/>
    <circle cx="35" cy="35" r="8" fill="#fff"/>
    <circle cx="0" cy="0" r="7" fill="#aee2ea" opacity="0.85"/>
    <line x1="0" y1="-36" x2="0" y2="-7" stroke="#fff" stroke-width="4" opacity="0.4"/>
    <line x1="-27" y1="30" x2="-6" y2="5" stroke="#fff" stroke-width="4" opacity="0.4"/>
    <line x1="27" y1="30" x2="6" y2="5" stroke="#fff" stroke-width="4" opacity="0.4"/>
    <line x1="-22" y1="10" x2="22" y2="10" stroke="#fff" stroke-width="3" opacity="0.25"/>
  </g>
  <!-- Text -->
  <text x="320" y="285" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#fff" letter-spacing="-1">SkillDepot</text>
  <text x="320" y="350" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#9ba3af" letter-spacing="0">Discover, share, and download AI Agent skills</text>
  <text x="320" y="400" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#4b5563">The open marketplace for AI-powered tools and workflows</text>
  <!-- Bottom bar -->
  <rect x="0" y="595" width="1200" height="35" fill="#0e9aa7" opacity="0.3"/>
  <text x="600" y="618" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#fff" opacity="0.6">skills.rehomi.com</text>
