<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0e9aa7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.2"/>
  <!-- Stylized "A" from connected nodes -->
  <!-- Top node -->
  <circle cx="32" cy="12" r="3.5" fill="#fff"/>
  <!-- Left bottom node -->
  <circle cx="17" cy="48" r="3.5" fill="#fff"/>
  <!-- Right bottom node -->
  <circle cx="47" cy="48" r="3.5" fill="#fff"/>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="3" fill="#e0f7fa" opacity="0.9"/>
  <!-- Connection lines (A shape) -->
  <line x1="32" y1="15.5" x2="32" y2="29" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="20.5" y1="44.5" x2="29.5" y2="33" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="43.5" y1="44.5" x2="34.5" y2="33" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <!-- Crossbar of A -->
  <line x1="23" y1="36" x2="41" y2="36" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
</svg>
