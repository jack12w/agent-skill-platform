<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillDepot 海报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #e5e7eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  .poster {
    width: 375px;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%);
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
    position: relative;
  }
  .glow-1 {
    position: absolute; top: -60px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(99,102,241,.3) 0%, transparent 70%);
    border-radius: 50%;
  }
  .glow-2 {
    position: absolute; bottom: 120px; left: -60px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(245,158,11,.2) 0%, transparent 70%);
    border-radius: 50%;
  }
  .content {
    position: relative; z-index: 1;
    padding: 40px 28px 32px;
  }
  .badge {
    display: inline-block;
    padding: 4px 14px;
    background: rgba(99,102,241,.2);
    border: 1px solid rgba(99,102,241,.4);
    border-radius: 20px;
    font-size: 12px; color: #a5b4fc;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .logo {
    font-size: 32px; font-weight: 900;
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 15px; color: #94a3b8;
    margin-bottom: 32px;
    letter-spacing: 2px;
  }
  .features {
    display: flex; flex-direction: column; gap: 12px;
    margin-bottom: 28px;
  }
  .feature {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: rgba(255,255,255,.05);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .feature-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .feature-icon.blue { background: rgba(99,102,241,.2); }
  .feature-icon.amber { background: rgba(245,158,11,.2); }
  .feature-icon.green { background: rgba(34,197,94,.2); }
  .feature-text { color: #e2e8f0; font-size: 14px; line-height: 1.5; }
  .feature-text strong { color: #fff; }
  .cta {
    display: block; text-align: center;
    padding: 14px 0;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 14px;
    color: #fff; font-size: 16px; font-weight: 700;
    text-decoration: none;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .url {
    text-align: center; font-size: 13px; color: #64748b;
    letter-spacing: 1px;
  }
  .divider {
    width: 40px; height: 3px;
    background: linear-gradient(90deg, #6366f1, #c084fc);
    border-radius: 2px;
    margin: 28px auto 20px;
  }
  .footer-text {
    text-align: center;
    font-size: 11px; color: #475569;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="poster">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="content">
    <div class="badge">🤖 AI 技能市场</div>
    <div class="logo">SkillDepot</div>
    <div class="tagline">把你的 AI 技能分享给全世界</div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon blue">📊</div>
        <div class="feature-text"><strong>选品分析</strong> · 市场趋势 AI 洞察</div>
      </div>
      <div class="feature">
        <div class="feature-icon amber">📝</div>
        <div class="feature-text"><strong>Listing 优化</strong> · 自动生成高转化描述</div>
      </div>
      <div class="feature">
        <div class="feature-icon green">💬</div>
        <div class="feature-text"><strong>客服话术</strong> · AI 智能回复模板</div>
      </div>
    </div>

    <a class="cta" href="https://skills.rehomi.com" target="_blank">🚀 立即体验</a>
    <div class="url">skills.rehomi.com</div>

    <div class="divider"></div>
    <div class="footer-text">
      上传你的 AI 技能包<br>让更多人发现和使用
    </div>
  </div>
</div>
</body>
</html>
