# 生产环境 Docker Compose
# 启动：docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# 停止：docker compose -f docker-compose.prod.yml down
# 日志：docker compose -f docker-compose.prod.yml logs -f

services:
  # ── PostgreSQL 数据库 ──────────────────────
  db:
    image: postgres:18-alpine
    container_name: agent_platform_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-platform}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME:-platform}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - app_net

  # ── NestJS API ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - BUILD_DATE=${BUILD_DATE:-0}
    container_name: agent_platform_api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-platform}
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET}
      - OSS_REGION=${OSS_REGION}
      - OSS_BUCKET=${OSS_BUCKET}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_PUBLIC_HOST=${OSS_PUBLIC_HOST}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://localhost}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - WECHAT_APPID=${WECHAT_APPID:-wxb2537aa7600236a7}
      - WECHAT_APPSECRET=${WECHAT_APPSECRET}
      # 微信登录总开关：后端 assertWechatLoginEnabled() 读取，不传则微信链路永远被拒
      - WECHAT_LOGIN_ENABLED=${WECHAT_LOGIN_ENABLED:-false}
      # 微信登录回调域名：getWechatAuthUrl 优先使用，不传则 fallback 到 PUBLIC_BASE_URL（可用但不稳妥）
      - WECHAT_REDIRECT_URI=${WECHAT_REDIRECT_URI}
      # 微信公众号 JS-SDK（分享）专用凭证：与网站应用登录 WECHAT_APPID 是两套，必须独立配置
      - WECHAT_OA_APPID=${WECHAT_OA_APPID}
      - WECHAT_OA_APPSECRET=${WECHAT_OA_APPSECRET}
    # API 不暴露宿主机端口，仅 Docker 内网通信（Web 容器通过 api:3001 访问）
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(''http'').get(''http://localhost:3001/api/health'',r=>{process.exit(r.statusCode===200?0:1)})"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  # ── Redis（邮件队列 Bull 后端）─────────────
  redis:
    image: redis:7-alpine
    container_name: agent_platform_redis
    restart: always
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_net

  # ── Next.js 前端 ───────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - NEXT_PUBLIC_WECHAT_LOGIN_ENABLED=${WECHAT_LOGIN_ENABLED:-false}
        - NEXT_PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://localhost}
    container_name: agent_platform_web
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_HOST=api
      - API_PORT=3001
      - NEXT_PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://localhost}
      - NEXT_PUBLIC_WECHAT_LOGIN_ENABLED=${WECHAT_LOGIN_ENABLED:-false}
    ports:
      - '3000:3000'
    depends_on:
      - api
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(''http'').get(''http://localhost:3000'',r=>{process.exit(r.statusCode===200?0:1)})"']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
